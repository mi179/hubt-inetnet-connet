name: 🦞 赛博龙虾云端自动打包发布

on:
  push:
    tags:
      - 'v*'                  # 推送 v 开头标签时触发，如 v0.3.0

jobs:
  build-and-release:
    runs-on: windows-latest    # GitHub 云 Windows 虚拟机

    steps:
    - name: 📥 1. 拉取最新代码
      uses: actions/checkout@v4

    - name: 🐍 2. 初始化云端 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 3. 安装本地依赖与打包神器
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller

    - name: 🏗️ 4. 执行 PyInstaller 编译单文件 EXE
      run: |
        pyinstaller --onefile exe_main.py --name cyber-lobster

    - name: 🚀 5. 自动创建 GitHub Release 并上传 EXE
      uses: softprops/action-gh-release@v2
      with:
        files: dist/cyber-lobster.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
